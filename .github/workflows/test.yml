name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install backend dependencies
      run: cd booking-saas/backend && npm install --no-package-lock

    - name: Run backend tests
      run: cd booking-saas/backend && npm test

    - name: Run linter
      run: cd booking-saas/backend && npm run lint || true

    - name: Install frontend dependencies
      run: cd booking-saas/frontend && npm install --no-package-lock

    - name: Build frontend
      run: cd booking-saas/frontend && npm run build

    - name: Install admin dependencies
      run: cd booking-saas/admin-dashboard && npm install --no-package-lock

    - name: Build admin dashboard
      run: cd booking-saas/admin-dashboard && npm run build
